<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account — PM System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="auth-page">

  <div class="auth-card auth-card-wide fade-up">

    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <span class="auth-logo-name">PM System</span>
    </div>

    <h2>Create account</h2>
    <p class="auth-subtitle">Join the Product Management workspace</p>

    <form id="registerForm" autocomplete="off">

      <div class="input-row col-2" style="margin-bottom:1.25rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label" for="username">Username</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="johndoe"
            required
          >
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label" for="name">Full name</label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="John Doe"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="emailReg">Email address</label>
        <input
          type="email"
          id="emailReg"
          class="form-control"
          placeholder="john@company.com"
          required
        >
      </div>

      <div class="form-group" style="margin-bottom:1.5rem;">
        <label class="form-label" for="passwordReg">Password</label>
        <div style="position:relative;">
          <input
            type="password"
            id="passwordReg"
            class="form-control"
            placeholder="Minimum 8 characters"
            required
            style="padding-right:2.8rem;"
          >
          <button
            type="button"
            id="togglePwdReg"
            style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:0;"
          >
            <i class="bi bi-eye" id="eyeIconReg"></i>
          </button>
        </div>
      </div>

      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:0.7rem;">
        <span id="regLabel">Create Account</span>
        <span id="regSpinner" class="spinner" style="display:none;"></span>
      </button>

    </form>

    <div id="registerMsg" class="mt-3 text-center"></div>

    <div class="auth-footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>

  </div>

  <script src="assets/auth.js"></script>
  <script>
    document.getElementById('togglePwdReg').addEventListener('click', () => {
      const pwd = document.getElementById('passwordReg')
      const icon = document.getElementById('eyeIconReg')
      if (pwd.type === 'password') {
        pwd.type = 'text'
        icon.className = 'bi bi-eye-slash'
      } else {
        pwd.type = 'password'
        icon.className = 'bi bi-eye'
      }
    })

    document.getElementById('registerForm').addEventListener('submit', () => {
      document.getElementById('regLabel').style.display = 'none'
      document.getElementById('regSpinner').style.display = 'inline-block'
    })
  </script>
</body>
</html>
