<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — PM System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="auth-page">

  <div class="auth-card fade-up">

    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <span class="auth-logo-name">PM System</span>
    </div>

    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to your workspace</p>

    <form id="loginForm" autocomplete="off">

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="name@company.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group" style="margin-bottom:1.5rem;">
        <label class="form-label" for="password">Password</label>
        <div style="position:relative;">
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            style="padding-right:2.8rem;"
          >
          <button
            type="button"
            id="togglePwd"
            style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:0;"
          >
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:0.7rem;">
        <span id="loginLabel">Sign In</span>
        <span id="loginSpinner" class="spinner" style="display:none;"></span>
      </button>

    </form>

    <div id="loginMsg" class="mt-3 text-center"></div>

    <div class="auth-footer-link">
      Don't have an account? <a href="/register">Create one</a>
    </div>

  </div>

  <script src="assets/auth.js"></script>
  <script>
    // Password toggle
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password')
      const icon = document.getElementById('eyeIcon')
      if (pwd.type === 'password') {
        pwd.type = 'text'
        icon.className = 'bi bi-eye-slash'
      } else {
        pwd.type = 'password'
        icon.className = 'bi bi-eye'
      }
    })

    // Loading state on submit
    document.getElementById('loginForm').addEventListener('submit', () => {
      document.getElementById('loginLabel').style.display = 'none'
      document.getElementById('loginSpinner').style.display = 'inline-block'
    })
  </script>
</body>
</html>
