<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Product — PM System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <a href="/dashboard" class="sidebar-brand">
        <div class="brand-icon">⚡</div>
        <div>
          <span class="brand-name">PM System</span>
          <span class="brand-tag">Workspace</span>
        </div>
      </a>
    </div>

    <div class="sidebar-nav">
      <span class="nav-section-label">Navigation</span>
      <a href="/dashboard" class="nav-link">
        <i class="bi bi-speedometer2 nav-icon"></i> Dashboard
      </a>
      <a href="/products" class="nav-link">
        <i class="bi bi-box-seam nav-icon"></i> Products
      </a>
      <a href="/add_product" class="nav-link active">
        <i class="bi bi-plus-circle nav-icon"></i> Add Product
      </a>
      <span class="nav-section-label">Tools</span>
      <a href="/ai_agent" class="nav-link">
        <i class="bi bi-robot nav-icon"></i> AI Assistant
      </a>
    </div>

    <div class="sidebar-footer">
      <button id="logoutBtn2" class="logout-btn">
        <i class="bi bi-box-arrow-right"></i> Sign Out
      </button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-content">

    <div class="page-header fade-up fade-up-1">
      <h2>Create New Product</h2>
      <p>Fill in the details to add a new item to your inventory.</p>
    </div>

    <div style="max-width:680px;" class="fade-up fade-up-2">
      <div class="card">
        <div class="card-body">

          <form id="addProductForm" autocomplete="off">

            <div class="input-row col-2-1" style="margin-bottom:1.25rem;">
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="title">Product title</label>
                <input
                  type="text"
                  id="title"
                  class="form-control"
                  placeholder="e.g. Premium Wireless Mouse"
                  required
                >
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="price">Price (USD)</label>
                <div style="position:relative;">
                  <span style="position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;">$</span>
                  <input
                    type="number"
                    step="0.01"
                    id="price"
                    class="form-control"
                    placeholder="0.00"
                    required
                    style="padding-left:1.8rem;"
                  >
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="category">Category</label>
              <select id="category" class="form-select">
                <option value="Electronics">Electronics</option>
                <option value="Software">Software</option>
                <option value="Hardware">Hardware</option>
                <option value="Services">Services</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="description">Description</label>
              <textarea
                id="description"
                class="form-control"
                rows="4"
                placeholder="Briefly describe the product…"
              ></textarea>
            </div>

            <div style="display:flex;gap:0.75rem;align-items:center;margin-top:0.5rem;">
              <button class="btn btn-primary" type="submit" style="flex:1;justify-content:center;padding:0.7rem;">
                <span id="submitLabel"><i class="bi bi-plus-circle"></i> Create Product</span>
                <span id="submitSpinner" class="spinner" style="display:none;"></span>
              </button>
              <a href="/products" class="btn btn-ghost" style="padding:0.7rem 1.2rem;">
                Cancel
              </a>
            </div>

          </form>

          <div id="addMsg" class="mt-3 text-center"></div>

        </div>
      </div>
    </div>

  </main>
</div>

<script src="assets/add_product.js"></script>
<script>
  // Loading state
  document.getElementById('addProductForm').addEventListener('submit', () => {
    document.getElementById('submitLabel').style.display = 'none'
    document.getElementById('submitSpinner').style.display = 'inline-block'
  })

  // Logout for this page's button
  document.getElementById('logoutBtn2').addEventListener('click', () => {
    localStorage.removeItem('token')
    window.location.href = '/login'
  })
</script>
</body>
</html>
