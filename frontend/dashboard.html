<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — PM System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <a href="/dashboard" class="sidebar-brand">
        <div class="brand-icon">⚡</div>
        <div>
          <span class="brand-name">PM System</span>
          <span class="brand-tag">Workspace</span>
        </div>
      </a>
    </div>

    <div class="sidebar-nav">
      <span class="nav-section-label">Navigation</span>
      <a href="/dashboard" class="nav-link active">
        <i class="bi bi-speedometer2 nav-icon"></i> Dashboard
      </a>
      <a href="/products" class="nav-link">
        <i class="bi bi-box-seam nav-icon"></i> Products
      </a>
      <a href="/add_product" class="nav-link">
        <i class="bi bi-plus-circle nav-icon"></i> Add Product
      </a>
      <span class="nav-section-label">Tools</span>
      <a href="/ai_agent" class="nav-link">
        <i class="bi bi-robot nav-icon"></i> AI Assistant
      </a>
    </div>

    <div class="sidebar-footer">
      <button id="logoutBtn" class="logout-btn">
        <i class="bi bi-box-arrow-right"></i> Sign Out
      </button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-content">

    <div class="page-header-row fade-up fade-up-1">
      <div>
        <h2>Analytics Overview</h2>
        <p style="color:var(--text-muted);font-size:0.875rem;margin-top:0.25rem;">
          Your product inventory at a glance
        </p>
      </div>
      <a href="/add_product" class="btn btn-primary">
        <i class="bi bi-plus"></i> New Product
      </a>
    </div>

    <!-- Stat row -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;">

      <div class="stat-card fade-up fade-up-1">
        <div class="stat-icon indigo"><i class="bi bi-box-seam"></i></div>
        <div class="stat-value" id="totalProducts">—</div>
        <div class="stat-label">Total Products</div>
      </div>

      <div class="stat-card fade-up fade-up-2">
        <div class="stat-icon cyan"><i class="bi bi-tag"></i></div>
        <div class="stat-value" id="totalCategories">—</div>
        <div class="stat-label">Categories</div>
      </div>

      <div class="stat-card fade-up fade-up-3">
        <div class="stat-icon emerald"><i class="bi bi-currency-dollar"></i></div>
        <div class="stat-value" id="avgPrice">—</div>
        <div class="stat-label">Avg. Price</div>
      </div>

    </div>

    <!-- Chart + Recent -->
    <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:1.25rem;margin-bottom:1.25rem;">

      <div class="card fade-up fade-up-2">
        <div class="card-body">
          <p style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:1rem;">
            Category breakdown
          </p>
          <div class="chart-container">
            <canvas id="catChart"></canvas>
          </div>
        </div>
      </div>

      <div class="card fade-up fade-up-3">
        <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);">
          <p style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);">
            Recent activity
          </p>
        </div>
        <div id="latestList"></div>
      </div>

    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="assets/dashboard.js"></script>
<script>
// Extend dashboard.js displayProducts to populate stat cards and chart
const _orig = window.displayProducts
window.displayProducts = function(products) {
  // Stat cards
  document.getElementById('totalProducts').textContent = products.length

  const cats = [...new Set(products.map(p => p.category).filter(Boolean))]
  document.getElementById('totalCategories').textContent = cats.length

  const prices = products.map(p => parseFloat(p.price)).filter(n => !isNaN(n))
  const avg = prices.length ? (prices.reduce((a, b) => a + b, 0) / prices.length).toFixed(0) : 0
  document.getElementById('avgPrice').textContent = '$' + avg

  // Recent list
  const list = document.getElementById('latestList')
  if (list) {
    list.innerHTML = ''
    const recent = [...products].slice(-6).reverse()
    if (recent.length === 0) {
      list.innerHTML = '<div style="padding:1.5rem;text-align:center;color:var(--text-muted);font-size:0.875rem;">No products yet</div>'
    } else {
      recent.forEach(p => {
        list.innerHTML += `
          <div class="activity-item">
            <div class="activity-dot"></div>
            <div class="activity-text"><strong>${p.title}</strong> — ${p.category || 'General'}</div>
            <div class="activity-time">$${parseFloat(p.price || 0).toFixed(2)}</div>
          </div>`
      })
    }
  }

  // Chart
  const catCount = {}
  products.forEach(p => {
    const c = p.category || 'Other'
    catCount[c] = (catCount[c] || 0) + 1
  })
  const ctx = document.getElementById('catChart')
  if (ctx) {
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(catCount),
        datasets: [{
          data: Object.values(catCount),
          backgroundColor: ['#6366f1','#22d3ee','#10b981','#f59e0b','#f43f5e'],
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        cutout: '72%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              color: '#4d6480',
              font: { family: 'Outfit', size: 11 },
              padding: 14,
              usePointStyle: true,
              pointStyleWidth: 8
            }
          }
        }
      }
    })
  }
}
</script>
</body>
</html>
