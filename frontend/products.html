<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products — PM System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app-wrapper">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <a href="/dashboard" class="sidebar-brand">
        <div class="brand-icon">⚡</div>
        <div>
          <span class="brand-name">PM System</span>
          <span class="brand-tag">Workspace</span>
        </div>
      </a>
    </div>

    <div class="sidebar-nav">
      <span class="nav-section-label">Navigation</span>
      <a href="/dashboard" class="nav-link">
        <i class="bi bi-speedometer2 nav-icon"></i> Dashboard
      </a>
      <a href="/products" class="nav-link active">
        <i class="bi bi-box-seam nav-icon"></i> Products
      </a>
      <a href="/add_product" class="nav-link">
        <i class="bi bi-plus-circle nav-icon"></i> Add Product
      </a>
      <span class="nav-section-label">Tools</span>
      <a href="/ai_agent" class="nav-link">
        <i class="bi bi-robot nav-icon"></i> AI Assistant
      </a>
    </div>

    <div class="sidebar-footer">
      <button id="logoutBtn" class="logout-btn">
        <i class="bi bi-box-arrow-right"></i> Sign Out
      </button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-content">

    <div class="page-header-row fade-up fade-up-1">
      <div>
        <h2>Product Inventory</h2>
        <p style="color:var(--text-muted);font-size:0.875rem;margin-top:0.25rem;">
          Manage and track all your products
        </p>
      </div>
      <a href="/add_product" class="btn btn-primary">
        <i class="bi bi-plus"></i> New Product
      </a>
    </div>

    <!-- Search / filter bar -->
    <div style="display:flex;gap:0.75rem;margin-bottom:1.25rem;" class="fade-up fade-up-2">
      <div style="position:relative;flex:1;max-width:340px;">
        <i class="bi bi-search" style="position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;"></i>
        <input
          id="searchInput"
          type="text"
          class="form-control"
          placeholder="Search products..."
          style="padding-left:2.4rem;"
        >
      </div>
    </div>

    <div id="productsMsg" style="margin-bottom:0.75rem;"></div>

    <div class="table-wrap fade-up fade-up-3">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Category</th>
            <th>Description</th>
            <th style="text-align:right;padding-right:1.5rem;">Actions</th>
          </tr>
        </thead>
        <tbody id="productsBody">
          <tr>
            <td colspan="5" style="text-align:center;padding:2.5rem;color:var(--text-muted);">
              <span class="spinner" style="display:inline-block;margin-right:8px;"></span>
              Loading products…
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="assets/products.js"></script>
<script>
  // Live search filter
  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase()
    document.querySelectorAll('#productsBody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none'
    })
  })
</script>
</body>
</html>
